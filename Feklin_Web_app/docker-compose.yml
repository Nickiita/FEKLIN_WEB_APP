version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: feklin_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  web_app:
    build: .
    container_name: feklin_web
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      - db
    restart: always
    command: bash -c "sleep 3 && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data: